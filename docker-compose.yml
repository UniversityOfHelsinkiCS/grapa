services:
  app:
    build:
      context: ./
      dockerfile: dev.Dockerfile
    image: grapa_dev
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
    volumes:
      - ./:/opt/app-root/src
    ports:
      - 3000:3000
      - 8000:8000
    container_name: grapa_dev

  db:
    image: postgres:15.18
    environment:
      - PGDATA=/data
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - pg_data:/data
    container_name: grapa_db

  redis:
    image: redis:7-alpine
    container_name: grapa_redis

  # login.toska.localhost:
  #   image: hy-oidc-emu
  #   ports: 
  #     - 3001:3001
  #   volumes:
  #     - ./oidc_emu/accounts.json:/opt/app-root/src/accounts.json
  #     - ./oidc_emu/configuration.json:/opt/app-root/src/configuration.json

volumes:
  pg_data:
